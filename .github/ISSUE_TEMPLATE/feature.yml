name: Feature request
description: New capability or enhancement
title: "feat(<area>): <imperative summary>"
type: "Feature"
labels: ["needs-triage"]
projects: ["librito-io/1"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What gap does this fill? Whose pain does it address?
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Concrete approach. UI mockup / API shape / state changes if relevant.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Optional. What else did you think about? Why this over that?

  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance criteria
    validations:
      required: true
