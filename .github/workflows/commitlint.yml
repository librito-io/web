name: commitlint

# Backstops the local `.husky/commit-msg` hook against contributors who never
# ran `npm install` (so husky never wired the hook) or who bypassed it with
# `--no-verify`. Lints every commit in the PR against `commitlint.config.js`,
# the same config the local hook uses. Pairs with `lint-pr-title.yml` which
# gates the PR title separately via amannn/action-semantic-pull-request.
#
# Convention + rationale: docs/dev/commits.md.

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: read

jobs:
  commitlint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          # commitlint needs the full PR commit range to lint each commit.
          fetch-depth: 0

      - name: Lint commit messages
        uses: wagoid/commitlint-github-action@v6
        with:
          configFile: commitlint.config.js
          # Lint every commit in the PR, not just the head. Catches a single
          # bad commit hidden inside an otherwise clean branch — relevant
          # because squash uses COMMIT_MESSAGES, so per-commit messages
          # become the durable archeology.
          firstParent: false
          failOnWarnings: false
          helpURL: https://github.com/librito-io/web/blob/main/docs/dev/commits.md
