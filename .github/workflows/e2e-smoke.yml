name: e2e-smoke

# Playwright suite for client-side behaviour that HTTP-level smoke can't
# observe: $state mutations, native input behaviour (maxlength, paste),
# inline error rendering, focus management, multi-step UI flows.
# Scope-gated to UI-touching paths to keep non-UI PRs (cron, migrations,
# server-only fixes) off the 60s Chromium boot path. Failure blocks merge.

on:
  pull_request:
    paths:
      - "src/routes/**"
      - "src/lib/**/*.svelte"
      - "src/lib/**/*.svelte.ts"
      - "src/app.html"
      - "src/app.css"
      - "tests/e2e/**"
      - "playwright.config.ts"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/e2e-smoke.yml"
  push:
    branches:
      - main
    paths:
      - "src/routes/**"
      - "src/lib/**/*.svelte"
      - "src/lib/**/*.svelte.ts"
      - "src/app.html"
      - "src/app.css"
      - "tests/e2e/**"
      - "playwright.config.ts"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/e2e-smoke.yml"

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      CI: "1"
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.0

      - uses: supabase/setup-cli@3c2f5e2ae34c34e428e8e206e2c4d21fa2d20fbf # v2.1.1
        with:
          version: 2.95.4

      - run: supabase start

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          cache: npm

      - run: npm ci

      # SvelteKit's vite dev reads .env at boot; synthesise one from the
      # running local Supabase so the dev server (started by
      # playwright.config.ts webServer) has Supabase pointers + keys.
      - name: Write .env for dev server
        run: |
          eval "$(supabase status -o env)"
          {
            echo "PUBLIC_SUPABASE_URL=$API_URL"
            echo "PUBLIC_SUPABASE_ANON_KEY=$ANON_KEY"
            echo "SUPABASE_SERVICE_ROLE_KEY=$SERVICE_ROLE_KEY"
          } > .env

      - name: Cache Playwright browsers
        id: pw-cache
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: Install Playwright Chromium
        if: steps.pw-cache.outputs.cache-hit != 'true'
        run: npx playwright install chromium --with-deps

      - name: Install Playwright system deps (cache hit)
        if: steps.pw-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium

      - name: Run e2e suite
        run: npm run test:e2e

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14

      - if: always()
        run: supabase stop
