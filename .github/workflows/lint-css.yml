name: lint-css

# Enforces issue #472: layout/positioning properties never live on bare CSS
# type selectors (they leak structurally onto reused semantic elements).
# Typography-on-tags (#421) is deliberately allowed and untouched. Runs the
# stylelint rule against real source AND the plugin's own unit test (this repo
# has no generic test workflow, so the rule logic is CI-protected here).
# Path-scoped so non-CSS PRs skip it. Failure blocks merge.

on:
  pull_request:
    paths:
      - "src/**/*.css"
      - "src/**/*.svelte"
      - "stylelint/**"
      - "stylelint.config.mjs"
      - "tests/lib/stylelint-no-positioning.test.ts"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/lint-css.yml"
  push:
    branches:
      - main
    paths:
      - "src/**/*.css"
      - "src/**/*.svelte"
      - "stylelint/**"
      - "stylelint.config.mjs"
      - "tests/lib/stylelint-no-positioning.test.ts"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/lint-css.yml"

jobs:
  lint-css:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.0

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          cache: npm

      - run: npm ci

      - name: stylelint (forbid positioning on bare type selectors)
        run: npm run lint:css

      - name: plugin unit test
        run: npx vitest run tests/lib/stylelint-no-positioning.test.ts
