name: Lint PR title

on:
  pull_request_target:
    # Add `synchronize` here only if this check is later made required-for-merge,
    # so commit pushes re-run the workflow and refresh the SHA-bound check status.
    types: [opened, reopened, edited]

# Workflow-level scope is `pull-requests: write` because the sticky-comment
# step needs write. The amannn action itself only needs `pull-requests: read`
# (one `pulls.get` call); write is a superset. We do NOT enable `wip:` — the
# WIP feature posts to `POST /statuses/:sha` which requires the separate
# `statuses: write` scope. Drafts cover the WIP case natively.
permissions:
  pull-requests: write

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Validate PR title against Conventional Commits
        id: lint
        uses: amannn/action-semantic-pull-request@v6
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          types: |
            feat
            fix
            bug
            chore
            docs
            test
            perf
            refactor
          requireScope: false
          subjectPattern: ^(?![A-Z])(?!.*\.$).+$
          subjectPatternError: |
            The subject doesn't match the configured pattern.
            Subject must start with a lowercase character and must not end with a period.

      - name: Post failure comment
        if: always() && (steps.lint.outputs.error_message != null)
        env:
          LINT_ERROR: ${{ steps.lint.outputs.error_message }}
        uses: marocchino/sticky-pull-request-comment@v3
        with:
          header: pr-title-lint
          message: |
            ### Pull request title doesn't follow Conventional Commits

            **Details:** ${{ env.LINT_ERROR }}

            Expected format: `type(scope): subject`

            - Allowed types: `feat`, `fix`, `bug`, `chore`, `docs`, `test`, `perf`, `refactor`
            - Subject must start lowercase and must not end with a period
            - Scope is optional and free-form

            See [`CLAUDE.md` → "PR & Commit Convention"](../blob/main/CLAUDE.md#pr--commit-convention) for the full convention.

      - name: Remove failure comment on pass
        if: ${{ steps.lint.outputs.error_message == null }}
        uses: marocchino/sticky-pull-request-comment@v3
        with:
          header: pr-title-lint
          delete: true
