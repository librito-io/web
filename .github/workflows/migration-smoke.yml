name: migration-smoke

on:
  pull_request:
    paths:
      - "supabase/migrations/**"
      - "supabase/seed.sql"
      - "supabase/config.toml"
  push:
    branches:
      - main
    paths:
      - "supabase/migrations/**"
      - "supabase/seed.sql"
      - "supabase/config.toml"

jobs:
  db-reset:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6

      - uses: supabase/setup-cli@v2
        with:
          # Pinned to match the local + production push-context CLI version.
          # Bumping requires a coordinated bump of every contributor's local CLI
          # so the parser behaviour stays uniform across local / CI / prod.
          version: 2.95.4

      - run: supabase start
      - run: supabase db reset --local

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          cache: npm

      - run: npm ci

      - run: npm run gen:types

      - name: Verify generated DB types are up to date
        run: |
          if ! git diff --exit-code src/lib/db.types.ts; then
            echo "::error::src/lib/db.types.ts is out of date relative to migrations."
            echo "Run 'npm run gen:types' locally and commit the result."
            exit 1
          fi

      - if: always()
        run: supabase stop
