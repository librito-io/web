name: migration-smoke

on:
  pull_request:
    paths:
      - "supabase/migrations/**"
      - "supabase/seed.sql"
      - "supabase/config.toml"
      - "src/lib/types/database.ts"
      - "tests/integration/**"
      - "vitest.integration.config.ts"
  push:
    branches:
      - main
    paths:
      - "supabase/migrations/**"
      - "supabase/seed.sql"
      - "supabase/config.toml"
      - "src/lib/types/database.ts"
      - "tests/integration/**"
      - "vitest.integration.config.ts"

jobs:
  db-reset:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7

      - uses: supabase/setup-cli@v2.1.1
        with:
          # Pinned to match the local + production push-context CLI version.
          # Bumping requires a coordinated bump of every contributor's local CLI
          # so the parser behaviour stays uniform across local / CI / prod.
          version: 2.95.4

      - run: supabase start
      - run: supabase db reset --local

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          cache: npm

      - run: npm ci

      - run: npm run gen:types

      - name: Verify generated DB types are up to date
        run: |
          if ! git diff --exit-code src/lib/types/database.ts; then
            echo "::error::src/lib/types/database.ts is out of date relative to migrations."
            echo "Run 'npm run gen:types' locally and commit the result."
            exit 1
          fi

      # Behavior-level migration assertions (issue #101). Reuses the already-
      # running local Supabase. Suite is gated on INTEGRATION=1 (set by the
      # npm script) so it never runs in the default unit suite.
      - name: Run integration suite (behavior-level migration tests)
        run: npm run test:integration

      - if: always()
        run: supabase stop
