name: production-deploy

on:
  push:
    branches: [main]

# Never cancel an in-flight run: interrupting a migration mid-push would leave
# the database in a partially-applied state with no automatic rollback.
concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      migrations: ${{ steps.filter.outputs.migrations }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4.0.1
        id: filter
        with:
          filters: |
            migrations:
              - 'supabase/migrations/**'

  migrate:
    needs: changes
    if: needs.changes.outputs.migrations == 'true'
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: supabase/setup-cli@df56b21da46c98abb12a9804e4fb1f657773e333 # v2.0.0
        with:
          # Pinned to match migration-smoke.yml and local dev CLI version.
          # Bumping requires a coordinated bump of every contributor's local CLI
          # so parser behaviour stays uniform across local / CI / prod.
          version: 2.95.4
      - name: Link to production project
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: supabase link --project-ref "${{ vars.SUPABASE_PROJECT_REF }}"
      - name: Push migrations to production
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
        run: supabase db push --linked

  deploy:
    needs: [changes, migrate]
    # Run if migrate succeeded OR was skipped (no migration files changed),
    # but only if the changes job itself succeeded.
    if: |
      always() &&
      (needs.migrate.result == 'success' || needs.migrate.result == 'skipped') &&
      needs.changes.result == 'success'
    runs-on: ubuntu-latest
    environment: production
    outputs:
      url: ${{ steps.deploy.outputs.url }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Pull Vercel project config
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ vars.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ vars.VERCEL_PROJECT_ID }}
        run: npx vercel pull --yes --environment=production --token="$VERCEL_TOKEN"
      - name: Build
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ vars.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ vars.VERCEL_PROJECT_ID }}
        run: npx vercel build --prod --token="$VERCEL_TOKEN"
      - id: deploy
        name: Deploy prebuilt to Vercel
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ vars.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ vars.VERCEL_PROJECT_ID }}
        run: |
          set -euo pipefail
          # `vercel deploy` prints the deployment URL on its final stdout line.
          url=$(npx vercel deploy --prebuilt --prod --token="$VERCEL_TOKEN" | tee /dev/stderr | tail -1)
          if [[ ! "$url" =~ ^https://[a-z0-9.-]+\.vercel\.app$ ]]; then
            echo "::error::Could not parse deployment URL from vercel deploy output (got: $url)"
            exit 1
          fi
          echo "url=$url" >> "$GITHUB_OUTPUT"
          echo "Deployed to: $url"

  smoke:
    # Post-deploy smoke probe for cron paths. Vercel cron invokes scheduled
    # paths via GET with `Authorization: Bearer ${CRON_SECRET}`. A route that
    # only exports POST silently returns 405 every fire — see issue #187 /
    # PR #188. This job catches that class of regression at deploy time.
    needs: deploy
    # `always() &&` is required because the transitive ancestor `migrate` is
    # skipped on non-migration deploys. Without it, GH's implicit success()
    # gate on the transitive needs chain skips smoke even though deploy
    # itself succeeded — same pattern the `deploy` job uses above.
    if: always() && needs.deploy.result == 'success'
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
      - id: paths
        name: Extract cron paths from vercel.ts
        run: |
          set -euo pipefail
          json=$(node --input-type=module -e "import('./vercel.ts').then(m => process.stdout.write(JSON.stringify((m.config.crons ?? []).map(c => c.path))))")
          echo "json=$json" >> "$GITHUB_OUTPUT"
          echo "Cron paths: $json"
      - name: Probe cron paths on production
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
          PATHS_JSON: ${{ steps.paths.outputs.json }}
          BASE: ${{ needs.deploy.outputs.url }}
        run: |
          set -euo pipefail
          if [ -z "${CRON_SECRET:-}" ]; then
            echo "::error::CRON_SECRET secret is not set in the production environment"
            exit 1
          fi
          if [ -z "${BASE:-}" ]; then
            echo "::error::deploy job did not emit a URL output"
            exit 1
          fi
          echo "Probing $BASE"
          fail=0
          # `curl --write-out %{http_code}` always emits 3 digits (000 on
          # connect failure), so let it report its own status without an
          # `|| echo` fallback that would double the output.
          while read -r p; do
            url="$BASE$p"
            # With valid auth → 200
            status=$(curl -sS -o /dev/null -w "%{http_code}" --max-time 30 \
              -H "Authorization: Bearer $CRON_SECRET" "$url" || true)
            if [ "$status" != "200" ]; then
              echo "::error::$p returned $status with valid CRON_SECRET (expected 200)"
              fail=1
            else
              echo "✓ $p → 200 (with auth)"
            fi
            # Without auth → 401 (catches accidental auth bypass)
            status=$(curl -sS -o /dev/null -w "%{http_code}" --max-time 30 "$url" || true)
            if [ "$status" != "401" ]; then
              echo "::error::$p returned $status with no auth (expected 401)"
              fail=1
            else
              echo "✓ $p → 401 (no auth)"
            fi
          done < <(printf '%s' "$PATHS_JSON" | python3 -c "import json,sys; [print(p) for p in json.load(sys.stdin)]")
          exit $fail
