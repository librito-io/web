<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Reset your Librito password</title>
  </head>
  <body
    style="margin: 0; padding: 0; background-color: #1a1a1a; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;"
  >
    <table
      role="presentation"
      width="100%"
      cellpadding="0"
      cellspacing="0"
      style="background-color: #1a1a1a; padding: 40px 16px;"
    >
      <tr>
        <td align="center">
          <table
            role="presentation"
            width="100%"
            cellpadding="0"
            cellspacing="0"
            style="max-width: 480px; background-color: #222; border: 1px solid #2a2a2a; border-radius: 12px; padding: 40px 32px;"
          >
            <tr>
              <td align="center" style="padding-bottom: 24px;">
                <span
                  style="font-size: 1.5rem; font-weight: 700; color: #e8e8e8; letter-spacing: 0.02em;"
                  >Librito</span
                >
              </td>
            </tr>
            <tr>
              <td
                style="color: #e8e8e8; font-size: 16px; line-height: 1.6; padding-bottom: 8px;"
              >
                We received a request to reset your password.
              </td>
            </tr>
            <tr>
              <td
                style="color: #e8e8e8; font-size: 16px; line-height: 1.6; padding-bottom: 32px;"
              >
                If you didn't make this request, you can safely ignore this
                email.
              </td>
            </tr>
            <tr>
              <td align="center" style="padding-bottom: 32px;">
                <a
                  href="{{ .ConfirmationURL }}"
                  style="display: inline-block; background-color: #2a2a2a; color: #e8e8e8; text-decoration: none; font-size: 15px; font-weight: 500; padding: 12px 28px; border-radius: 999px; border: 1px solid #3a3a3a;"
                >
                  Reset Password
                </a>
              </td>
            </tr>
            <tr>
              <td
                style="color: #888; font-size: 13px; line-height: 1.5; border-top: 1px solid #2a2a2a; padding-top: 24px;"
              >
                You received this email because a password reset was requested
                for your Librito account. If this wasn't you, no action is
                needed.
              </td>
            </tr>
          </table>
        </td>
      </tr>
    </table>
  </body>
</html>
